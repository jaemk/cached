name: comment-close-issue-257

on:
  push:
    branches:
      - copilot/comment-close-issue-257
  workflow_dispatch:

jobs:
  comment-and-close:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue_number = 257;
            const comment_marker = 'implemented in PR #259';

            // Check if we already posted this comment (idempotent)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const alreadyCommented = comments.some(c => c.body.includes(comment_marker));

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: 'This was implemented in PR #259 and released in v0.59.0. ' +
                      'The new `time_stores` feature flag (enabled by default) gates all ' +
                      'time-dependent cache types, so disabling it makes the crate fully ' +
                      'compatible with `wasm32-unknown-unknown` targets that lack system-time access.',
              });
            }

            // Close the issue if still open
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            if (issue.state === 'open') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                state: 'closed',
              });
            }
